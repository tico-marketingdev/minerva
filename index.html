<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minerva — Tráfego Pago para Escolas</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde-escuro: #003D2F;
    --verde-medio: #00806A;
    --verde-neon: #43E0C6;
    --branco: #ffffff;
    --cinza-claro: #f4f4f2;
    --cinza-texto: #5a6370;
    --grad: linear-gradient(135deg, #003D2F 0%, #00806A 55%, #43E0C6 100%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Sora', sans-serif;
    background: #fff;
    color: var(--verde-escuro);
    overflow-x: hidden;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,61,47,0.08);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.7rem;
    font-size: 1.35rem; font-weight: 700; color: var(--verde-escuro);
    text-decoration: none; letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--verde-neon); }
  .nav-logo-bar {
    width: 28px; height: 2px; background: var(--verde-medio);
    display: inline-block; margin-right: 6px; vertical-align: middle;
  }
  nav ul { list-style: none; display: flex; gap: 2.5rem; }
  nav ul a { text-decoration: none; font-size: 0.85rem; font-weight: 500;
    color: var(--verde-escuro); opacity: 0.75; transition: opacity .2s; }
  nav ul a:hover { opacity: 1; }
  .nav-cta {
    background: var(--verde-escuro); color: #fff;
    padding: 0.65rem 1.5rem; border-radius: 4px;
    font-size: 0.85rem; font-weight: 600; text-decoration: none;
    transition: background .2s;
  }
  .nav-cta:hover { background: var(--verde-medio); }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 8rem 4rem 5rem;
    position: relative; overflow: hidden;
    background: var(--verde-escuro);
  }
  .hero::before {
    content: '';
    position: absolute; top: -10%; right: -5%;
    width: 55%; height: 120%;
    background: linear-gradient(160deg, #00806A 0%, #43E0C6 100%);
    clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
    opacity: 0.18;
  }
  .hero-grafismo {
    position: absolute; bottom: -60px; right: -40px;
    width: 320px; opacity: 0.07;
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-tag {
    display: inline-block;
    background: rgba(67,224,198,0.15);
    border: 1px solid rgba(67,224,198,0.35);
    color: var(--verde-neon);
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.4rem 1rem;
    border-radius: 2px; margin-bottom: 2rem;
  }
  .hero h1 {
    font-size: clamp(2.4rem, 4vw, 3.6rem);
    font-weight: 800; line-height: 1.08;
    color: #fff; letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }
  .hero h1 em { font-style: normal; color: var(--verde-neon); }
  .hero-sub {
    font-size: 1.05rem; font-weight: 300; line-height: 1.7;
    color: rgba(255,255,255,0.65); max-width: 480px;
    margin-bottom: 2.5rem;
  }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--verde-neon); color: var(--verde-escuro);
    padding: 1rem 2rem; border-radius: 4px;
    font-size: 0.9rem; font-weight: 700; text-decoration: none;
    transition: transform .2s, box-shadow .2s;
    display: inline-block;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(67,224,198,0.35); }
  .btn-ghost {
    border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.8);
    padding: 1rem 2rem; border-radius: 4px;
    font-size: 0.9rem; font-weight: 500; text-decoration: none;
    transition: border-color .2s, color .2s; display: inline-block;
  }
  .btn-ghost:hover { border-color: var(--verde-neon); color: var(--verde-neon); }
  .hero-right { position: relative; z-index: 2; display: flex; align-items: center; justify-content: flex-end; }

  /* Phone mockup */
  .phone-wrap {
    position: relative; width: 280px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .phone {
    width: 100%; background: #0a1a16;
    border-radius: 36px; padding: 1.5rem 1.2rem;
    border: 6px solid #1a3a30;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(67,224,198,0.1);
  }
  .phone-notch {
    width: 80px; height: 8px; background: #1a3a30;
    border-radius: 4px; margin: 0 auto 1.2rem;
  }
  .phone-header {
    font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--verde-neon);
    margin-bottom: 0.8rem; opacity: 0.7;
  }
  .phone-msg {
    background: rgba(67,224,198,0.08);
    border-left: 2px solid var(--verde-neon);
    border-radius: 0 8px 8px 0;
    padding: 0.75rem 0.9rem;
    margin-bottom: 0.7rem;
  }
  .phone-msg-label {
    font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--verde-neon); margin-bottom: 0.4rem;
  }
  .phone-msg p {
    font-size: 0.72rem; line-height: 1.5; color: rgba(255,255,255,0.85);
    font-weight: 300;
  }
  .phone-msg p strong { color: var(--verde-neon); font-weight: 700; }
  .phone-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.5rem; margin-top: 0.7rem;
  }
  .phone-stat {
    background: rgba(0,128,106,0.15);
    border-radius: 8px; padding: 0.6rem 0.7rem;
    text-align: center;
  }
  .phone-stat-num {
    font-size: 1.1rem; font-weight: 800; color: var(--verde-neon);
    display: block;
  }
  .phone-stat-label {
    font-size: 0.52rem; color: rgba(255,255,255,0.55);
    font-weight: 400; letter-spacing: 0.04em;
  }
  .phone-divider {
    height: 1px; background: rgba(255,255,255,0.05);
    margin: 0.8rem 0;
  }
  .phone-chip {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: rgba(67,224,198,0.12); border-radius: 20px;
    padding: 0.3rem 0.7rem; font-size: 0.6rem;
    color: var(--verde-neon); font-weight: 600;
  }
  .phone-chip::before { content: '●'; font-size: 0.4rem; }

  /* Hero metrics */
  .hero-metrics {
    display: flex; gap: 2rem; margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .hero-metric-num {
    font-size: 1.8rem; font-weight: 800; color: var(--verde-neon);
    display: block; line-height: 1;
  }
  .hero-metric-label {
    font-size: 0.72rem; color: rgba(255,255,255,0.5);
    margin-top: 0.3rem; font-weight: 300;
  }

  /* ─── LOGOS ─── */
  .logos-bar {
    background: var(--cinza-claro);
    padding: 2.5rem 4rem;
    display: flex; align-items: center; gap: 2rem;
  }
  .logos-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--cinza-texto);
    white-space: nowrap;
  }
  .logos-track {
    flex: 1; display: flex; gap: 3rem; align-items: center;
    overflow: hidden; flex-wrap: wrap;
  }
  .logo-pill {
    background: white; border-radius: 6px;
    padding: 0.6rem 1.4rem; font-size: 0.8rem; font-weight: 700;
    color: var(--verde-escuro); opacity: 0.55; white-space: nowrap;
    border: 1px solid rgba(0,61,47,0.08);
  }

  /* ─── SECTION BASE ─── */
  section { padding: 6rem 4rem; }
  .section-tag {
    display: inline-block;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--verde-medio);
    margin-bottom: 1rem;
  }
  h2 {
    font-size: clamp(1.9rem, 3vw, 2.8rem);
    font-weight: 800; letter-spacing: -0.03em; line-height: 1.1;
    color: var(--verde-escuro);
  }
  h2 em { font-style: normal; color: var(--verde-medio); }

  /* ─── PROPOSTA DE VALOR ─── */
  .proposta {
    background: #fff;
    display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center;
  }
  .proposta-text p {
    font-size: 1rem; line-height: 1.75; color: var(--cinza-texto);
    margin-top: 1.5rem; font-weight: 300;
  }
  .proposta-cards { display: flex; flex-direction: column; gap: 1rem; }
  .proposta-card {
    display: flex; gap: 1.2rem; align-items: flex-start;
    padding: 1.5rem; border-radius: 8px;
    border: 1px solid rgba(0,61,47,0.08);
    transition: border-color .2s, box-shadow .2s;
  }
  .proposta-card:hover {
    border-color: var(--verde-neon);
    box-shadow: 0 4px 24px rgba(67,224,198,0.12);
  }
  .proposta-card-icon {
    width: 44px; height: 44px; border-radius: 8px;
    background: linear-gradient(135deg, var(--verde-escuro), var(--verde-medio));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .proposta-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.35rem; }
  .proposta-card p { font-size: 0.82rem; color: var(--cinza-texto); line-height: 1.6; }

  /* ─── IA ─── */
  .ia-section { background: var(--verde-escuro); position: relative; overflow: hidden; }
  .ia-section::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 40%; height: 100%;
    background: linear-gradient(180deg, #00806A 0%, transparent 100%);
    opacity: 0.15;
  }
  .ia-section .section-tag { color: var(--verde-neon); }
  .ia-section h2 { color: #fff; }
  .ia-section h2 em { color: var(--verde-neon); }
  .ia-inner { position: relative; z-index: 2; }
  .ia-subtitle {
    font-size: 1rem; color: rgba(255,255,255,0.55); font-weight: 300;
    max-width: 540px; margin-top: 1rem; margin-bottom: 3.5rem; line-height: 1.7;
  }
  .ia-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .ia-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(67,224,198,0.12);
    border-radius: 10px; padding: 2rem;
    transition: border-color .2s, background .2s;
  }
  .ia-card:hover {
    border-color: rgba(67,224,198,0.4);
    background: rgba(255,255,255,0.07);
  }
  .ia-card-num {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--verde-neon); opacity: 0.6;
    margin-bottom: 1rem;
  }
  .ia-card h3 { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; }
  .ia-card p { font-size: 0.83rem; color: rgba(255,255,255,0.5); line-height: 1.65; font-weight: 300; }
  .ia-card ul { list-style: none; margin-top: 1rem; }
  .ia-card ul li {
    font-size: 0.78rem; color: rgba(255,255,255,0.45); line-height: 1.6;
    padding-left: 1rem; position: relative;
  }
  .ia-card ul li::before {
    content: '—'; position: absolute; left: 0;
    color: var(--verde-neon); font-size: 0.65rem;
  }

  /* ─── ACOMPANHAMENTO ─── */
  .acomp-section { background: var(--cinza-claro); }
  .acomp-header { max-width: 600px; margin-bottom: 3.5rem; }
  .acomp-header p { font-size: 1rem; color: var(--cinza-texto); margin-top: 1rem; line-height: 1.7; font-weight: 300; }
  .acomp-timeline { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
  .acomp-item {
    background: #fff; border-radius: 10px; padding: 2rem;
    border-top: 3px solid transparent;
    transition: border-color .2s;
    position: relative;
  }
  .acomp-item:nth-child(1) { border-top-color: var(--verde-neon); }
  .acomp-item:nth-child(2) { border-top-color: var(--verde-medio); }
  .acomp-item:nth-child(3) { border-top-color: var(--verde-escuro); }
  .acomp-freq {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--verde-medio); margin-bottom: 1rem;
  }
  .acomp-item h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.75rem; }
  .acomp-item p { font-size: 0.83rem; color: var(--cinza-texto); line-height: 1.65; font-weight: 300; margin-bottom: 1rem; }
  .acomp-bullets { list-style: none; }
  .acomp-bullets li {
    font-size: 0.78rem; color: var(--cinza-texto); line-height: 1.7;
    padding-left: 1rem; position: relative;
  }
  .acomp-bullets li::before { content: '·'; position: absolute; left: 0; color: var(--verde-neon); font-size: 1.2rem; line-height: 1; }
  .acomp-highlight {
    margin-top: 3rem; background: var(--verde-escuro);
    border-radius: 12px; padding: 2.5rem 3rem;
    display: flex; align-items: center; gap: 3rem;
  }
  .acomp-highlight-icon { font-size: 3rem; flex-shrink: 0; }
  .acomp-highlight h3 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
  .acomp-highlight p { font-size: 0.9rem; color: rgba(255,255,255,0.6); line-height: 1.7; font-weight: 300; }
  .msg-preview {
    flex: 1; background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 1.2rem 1.5rem; border-left: 3px solid var(--verde-neon);
    font-size: 0.82rem; color: rgba(255,255,255,0.8); line-height: 1.7; font-weight: 300;
    font-style: italic;
  }
  .msg-preview strong { color: var(--verde-neon); font-style: normal; font-weight: 700; }

  /* ─── SERVIÇOS ─── */
  .servicos { background: #fff; }
  .servicos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
  .servico-card {
    border: 1px solid rgba(0,61,47,0.1); border-radius: 10px; padding: 2rem;
    transition: all .2s;
  }
  .servico-card:hover {
    border-color: var(--verde-neon);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(67,224,198,0.1);
  }
  .servico-icon { font-size: 1.5rem; margin-bottom: 1rem; }
  .servico-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .servico-card p { font-size: 0.82rem; color: var(--cinza-texto); line-height: 1.65; font-weight: 300; }

  /* ─── COMPARATIVO ─── */
  .comparativo { background: var(--verde-escuro); }
  .comparativo h2 { color: #fff; }
  .comparativo h2 em { color: var(--verde-neon); }
  .comp-table { margin-top: 3rem; border-radius: 10px; overflow: hidden; border: 1px solid rgba(67,224,198,0.1); }
  .comp-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; }
  .comp-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .comp-row.header { background: rgba(67,224,198,0.06); }
  .comp-cell {
    padding: 1rem 1.5rem; font-size: 0.83rem; color: rgba(255,255,255,0.6);
    font-weight: 300; border-right: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center;
  }
  .comp-cell:last-child { border-right: none; }
  .comp-row.header .comp-cell { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .comp-cell.destaque { color: var(--verde-neon); font-weight: 500; }
  .comp-row:nth-child(even) { background: rgba(255,255,255,0.02); }
  .comp-criterio { color: rgba(255,255,255,0.8); font-weight: 500; }

  /* ─── CASE ─── */
  .case-section { background: var(--cinza-claro); }
  .case-inner {
    background: var(--verde-escuro); border-radius: 16px;
    padding: 4rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
  }
  .case-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--verde-neon); margin-bottom: 0.75rem; }
  .case-inner h3 { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 1rem; line-height: 1.2; }
  .case-inner p { font-size: 0.9rem; color: rgba(255,255,255,0.55); line-height: 1.7; font-weight: 300; }
  .case-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .case-metric { text-align: center; }
  .case-metric-num { font-size: 2.2rem; font-weight: 800; color: var(--verde-neon); display: block; line-height: 1; }
  .case-metric-label { font-size: 0.7rem; color: rgba(255,255,255,0.45); margin-top: 0.4rem; line-height: 1.4; font-weight: 300; }
  .case-metric-divider { height: 2px; background: rgba(67,224,198,0.15); margin: 1.5rem 0; }

  /* ─── CTA FINAL ─── */
  .cta-final {
    background: var(--grad); text-align: center;
    padding: 7rem 4rem; position: relative; overflow: hidden;
  }
  .cta-final::before {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }
  .cta-final h2 { color: #fff; font-size: clamp(2rem, 4vw, 3rem); position: relative; }
  .cta-final p { color: rgba(255,255,255,0.7); max-width: 500px; margin: 1.2rem auto 2.5rem; font-weight: 300; font-size: 1rem; line-height: 1.7; position: relative; }
  .cta-final .btn-white {
    background: #fff; color: var(--verde-escuro);
    padding: 1.1rem 2.5rem; border-radius: 4px;
    font-size: 0.9rem; font-weight: 700; text-decoration: none;
    display: inline-block; position: relative;
    transition: transform .2s, box-shadow .2s;
  }
  .cta-final .btn-white:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
  .cta-micro { margin-top: 1.2rem; font-size: 0.75rem; color: rgba(255,255,255,0.5); position: relative; }

  /* ─── FOOTER ─── */
  footer {
    background: var(--verde-escuro); padding: 2.5rem 4rem;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer-logo { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.7); }
  .footer-logo span { color: var(--verde-neon); }
  footer p { font-size: 0.75rem; color: rgba(255,255,255,0.3); font-weight: 300; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    nav { padding: 1rem 1.5rem; }
    nav ul { display: none; }
    section { padding: 4rem 1.5rem; }
    .hero { grid-template-columns: 1fr; padding: 7rem 1.5rem 4rem; gap: 3rem; }
    .hero-right { justify-content: center; }
    .phone-wrap { width: 240px; }
    .logos-bar { padding: 2rem 1.5rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
    .proposta { grid-template-columns: 1fr; gap: 3rem; }
    .ia-grid { grid-template-columns: 1fr; }
    .acomp-timeline { grid-template-columns: 1fr; }
    .acomp-highlight { flex-direction: column; gap: 1.5rem; }
    .servicos-grid { grid-template-columns: 1fr; }
    .comp-row { grid-template-columns: 1fr; }
    .comp-cell { border-right: none; }
    .comp-row.header { display: none; }
    .case-inner { grid-template-columns: 1fr; padding: 2.5rem; gap: 2.5rem; }
    .cta-final { padding: 5rem 1.5rem; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }

  .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ─── FORMULÁRIO WIZARD ─── */
  .form-section {
    background: #021f19;
    padding: 3.5rem 4rem;
    position: relative; overflow: hidden;
  }
  .form-section::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(67,224,198,0.4), transparent);
  }
  .form-section::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(67,224,198,0.15), transparent);
  }
  .form-inner { max-width: 620px; margin: 0 auto; text-align: center; }
  .form-escola-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;

// ── FORMULÁRIO WIZARD ────────────────────────────────────────
(function () {
  const passos = [
    { campo: 'nome',   tipo: 'text',        pergunta: 'Qual é o seu nome?',           placeholder: 'Maria Silva',       dica: 'Responsável pelo contato' },
    { campo: 'escola', tipo: 'text',        pergunta: 'Nome da escola?',              placeholder: 'Colégio São Paulo', dica: '' },
    { campo: 'cat',    tipo: 'multiselect', pergunta: 'Categoria da escola?',         opcoes: CONFIG.formulario.categorias, dica: 'Pode selecionar mais de uma' },
    { campo: 'cidade', tipo: 'text',        pergunta: 'Em qual cidade?',              placeholder: 'São Paulo',         dica: '' },
    { campo: 'turmas', tipo: 'number',      pergunta: 'Quantas turmas a escola tem?', placeholder: '12',                dica: 'Número aproximado está ótimo' },
    { campo: 'zap',    tipo: 'tel',         pergunta: 'Qual é o seu WhatsApp?',       placeholder: '(11) 9 9999-8888',  dica: 'Entraremos em contato por aqui' },
  ];

  let atual = 0;
  const dados = {};
  const wizard = document.getElementById('form-wizard');

  function dots() {
    return passos.map((_, i) =>
      `<div class="form-dot ${i === atual ? 'ativo' : i < atual ? 'feito' : ''}"></div>`
    ).join('');
  }

  function render() {
    const p = passos[atual];
    let corpo = '';

    if (p.tipo === 'multiselect') {
      corpo = `<div class="form-pills" id="form-pills">
        ${p.opcoes.map(o => `
          <button type="button" class="form-pill ${(dados[p.campo] || []).includes(o) ? 'selecionado' : ''}" data-val="${o}">${o}</button>
        `).join('')}
      </div>`;
    } else {
      corpo = `<input class="form-input" id="form-campo" type="${p.tipo}" placeholder="${p.placeholder}" value="${dados[p.campo] || ''}" autocomplete="off">`;
    }

    wizard.innerHTML = `
      <div class="form-progress">${dots()}</div>
      <div class="form-pergunta">${p.pergunta}</div>
      ${corpo}
      ${p.dica ? `<p class="form-hint">${p.dica}</p>` : ''}
      <div class="form-actions">
        ${atual > 0 ? `<button type="button" class="form-btn-voltar" id="form-voltar">← Voltar</button>` : ''}
        <button type="button" class="form-btn-avancar" id="form-avancar">
          ${atual === passos.length - 1 ? 'Enviar' : 'Continuar →'}
        </button>
      </div>
    `;

    const btnAv = document.getElementById('form-avancar');
    const btnVo = document.getElementById('form-voltar');

    if (p.tipo === 'multiselect') {
      document.querySelectorAll('.form-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          const val = pill.dataset.val;
          if (!dados[p.campo]) dados[p.campo] = [];
          if (dados[p.campo].includes(val)) {
            dados[p.campo] = dados[p.campo].filter(v => v !== val);
            pill.classList.remove('selecionado');
          } else {
            dados[p.campo].push(val);
            pill.classList.add('selecionado');
          }
        });
      });
    } else {
      const campo = document.getElementById('form-campo');
      campo.focus();
      campo.addEventListener('input', () => { dados[p.campo] = campo.value; });
      campo.addEventListener('keydown', e => { if (e.key === 'Enter') btnAv.click(); });
    }

    btnAv.addEventListener('click', () => {
      const val = dados[p.campo];
      const vazio = p.tipo === 'multiselect' ? (!val || val.length === 0) : (!val || !String(val).trim());
      if (vazio) return;
      if (atual < passos.length - 1) { atual++; render(); } else { enviar(); }
    });

    if (btnVo) btnVo.addEventListener('click', () => { atual--; render(); });
  }

  async function enviar() {
    wizard.innerHTML = `<p style="text-align:center;color:rgba(255,255,255,0.4);font-size:0.9rem;padding:2rem 0">Enviando...</p>`;

    const payload = {
      nome:      dados.nome,
      escola:    dados.escola,
      categoria: (dados.cat || []).join(', '),
      cidade:    dados.cidade,
      turmas:    dados.turmas,
      whatsapp:  dados.zap,
      origem:    'Site Minerva',
      data:      new Date().toLocaleString('pt-BR'),
    };

    try {
      if (CONFIG.formulario.webhook) {
        await fetch(CONFIG.formulario.webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      }
    } catch (_) {}

    const primeiro = dados.nome ? dados.nome.split(' ')[0] : '';
    wizard.innerHTML = `
      <div class="form-sucesso">
        <div class="form-sucesso-check">✓</div>
        <h3>Recebido, ${primeiro}.</h3>
        <p>Entraremos em contato pelo WhatsApp em breve.<br>Geralmente respondemos no mesmo dia.</p>
      </div>
    `;
  }

  render();
})();

// ── Animação de entrada ──────────────────────────────────────
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
</script>
